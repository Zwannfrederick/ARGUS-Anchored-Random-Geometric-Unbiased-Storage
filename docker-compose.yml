version: "3.8"

services:
  argus-tinyllama-service:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: argus-tinyllama-gpt
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model TinyLlama/TinyLlama-1.1B-Chat-v1.0
      --trust-remote-code
      --max-model-len 2048
      --gpu-memory-utilization 0.7
    restart: unless-stopped
